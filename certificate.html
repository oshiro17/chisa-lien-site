<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>恋愛サポートアドバイザー認定証｜結城ちさ</title>
<style>
  @page { size: A4 landscape; margin: 0; }
  html,body{margin:0;padding:0;background:#f0e9e2;font-family:"Hiragino Mincho ProN","Yu Mincho",serif}
  .stage{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .cert{position:relative;container-type:inline-size;width:100%;max-width:1000px;line-height:0;box-shadow:0 14px 40px rgba(0,0,0,.18)}
  .cert img{width:100%}
  .cert .name{position:absolute;left:41%;top:51.5%;transform:translate(-50%,-50%);
    color:#2b2b2b;font-size:3.4cqw;font-weight:600;letter-spacing:.14em;white-space:nowrap}
  @media print{
    html,body{background:#fff}
    .stage{padding:0}
    .cert{max-width:none;width:297mm;height:210mm;box-shadow:none}
    .cert img{height:210mm;width:297mm;object-fit:contain}
  }
</style>
</head>
<body>
<div class="stage">
  <div class="cert">
    <img src="assets/img/certificate.png" alt="恋愛サポートアドバイザー認定証（結城ちさ）">
  </div>
</div>
</body>
</html>
